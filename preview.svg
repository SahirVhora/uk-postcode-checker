<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- accent line -->
  <rect x="80" y="280" width="200" height="4" rx="2" fill="url(#accent)"/>
  <!-- emoji -->
  <text x="80" y="200" font-size="64" font-family="sans-serif">📍</text>
  <!-- project name -->
  <text x="80" y="330" font-size="52" font-family="sans-serif" font-weight="bold" fill="#f0f6fc">UK Postcode Checker</text>
  <!-- tagline -->
  <text x="80" y="400" font-size="24" font-family="sans-serif" fill="#8b949e">Instant demographic lookup - crime, census, schools, transport, flood risk</text>
  <!-- footer -->
  <text x="80" y="580" font-size="18" font-family="sans-serif" fill="#484f58">sahirvhora.github.io</text>
  <!-- bottom accent bar -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accent)"/>
</svg>